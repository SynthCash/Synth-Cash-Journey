<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynthCash Logs</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@300;400;600;700&display=swap');

:root {
  --gold: #f5c842;
  --gold2: #e0a800;
  --gold-dim: rgba(245,200,66,0.1);
  --green: #3dffa0;
  --blue: #5eb8ff;
  --red: #ff5370;
  --purple: #c084fc;
  --bg: #0c0c18;
  --bg2: #12121f;
  --bg3: #1a1a2e;
  --bg4: #20203a;
  --border: rgba(245,200,66,0.15);
  --border-soft: rgba(255,255,255,0.06);
  --text: #e2dff5;
  --text-dim: rgba(226,223,245,0.45);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; font-size:17px; }

body {
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-size:16px;
  line-height:1.6;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 20%, rgba(245,200,66,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 90% 80%, rgba(94,184,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 50% 50%, rgba(192,132,252,0.03) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size:32px 32px;
  pointer-events:none; z-index:0;
}

/* ── LAYOUT ── */
.app { position:relative; z-index:1; display:grid; grid-template-columns:260px 1fr; min-height:100vh; }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh; overflow-y:auto;
}

/* Logo */
.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.logo-text {
  font-family:'Press Start 2P', monospace;
  font-size:12px;
  color: var(--gold);
  text-shadow: 0 0 16px rgba(245,200,66,0.5);
  line-height:1.8;
}

.logo-sub {
  font-family:'Press Start 2P', monospace;
  font-size:8px;
  color: var(--text-dim);
  margin-top:4px;
}

/* Character sheet */
.char-sheet {
  padding:20px;
  border-bottom:1px solid var(--border-soft);
}

.avatar-wrap { position:relative; margin:0 auto 16px; width:fit-content; }

.avatar {
  width:80px; height:80px;
  background: var(--bg3);
  border:2px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:38px; margin:0 auto;
  box-shadow: 0 0 24px rgba(245,200,66,0.2);
}

.lv-badge {
  position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
  background:var(--gold); color:var(--bg);
  font-family:'Press Start 2P', monospace; font-size:6px;
  padding:4px 8px; border:2px solid var(--bg2);
  white-space:nowrap;
}

.char-name {
  font-family:'Rajdhani', sans-serif;
  font-size:22px; font-weight:700;
  color:var(--gold); text-align:center;
  letter-spacing:2px; margin-top:18px;
  text-shadow:0 0 20px rgba(245,200,66,0.3);
}

.char-class {
  font-family:'Rajdhani', sans-serif;
  font-size:11px; color:var(--text-dim);
  text-align:center; text-transform:uppercase;
  letter-spacing:2px; margin:4px 0 16px;
}

.bars { display:flex; flex-direction:column; gap:8px; }

.bar-row { display:flex; align-items:center; gap:8px; }

.bar-lbl {
  font-family:'Press Start 2P', monospace;
  font-size:6px; width:30px; flex-shrink:0;
}
.bar-lbl.hp { color:var(--red); }
.bar-lbl.fp { color:var(--blue); }
.bar-lbl.xp { color:var(--gold); }

.bar-track {
  flex:1; height:10px;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.05);
  overflow:hidden;
}

.bar-fill { height:100%; position:relative; }
.bar-fill::after {
  content:''; position:absolute;
  top:2px; left:4px; right:4px; height:2px;
  background:rgba(255,255,255,0.2);
}
.bar-fill.hp { background:linear-gradient(90deg,#b91c1c,var(--red)); }
.bar-fill.fp { background:linear-gradient(90deg,#1d4ed8,var(--blue)); }
.bar-fill.xp { background:linear-gradient(90deg,#92400e,var(--gold)); animation:xp-pulse 2s ease-in-out infinite; }

@keyframes xp-pulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.4)} }

.bar-val {
  font-family:'Press Start 2P', monospace;
  font-size:6px; color:var(--text-dim);
  width:56px; text-align:right; flex-shrink:0;
}

/* Mini stats */
.mini-stats {
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:6px; padding:16px 20px;
  border-bottom:1px solid var(--border-soft);
}

.mini-s {
  background:var(--bg3);
  border:1px solid var(--border-soft);
  padding:10px 8px; text-align:center;
}

.mini-s-val {
  font-family:'Rajdhani', sans-serif;
  font-size:20px; font-weight:700;
  color:var(--gold); line-height:1;
}
.mini-s-val.green { color:var(--green); }
.mini-s-val.blue  { color:var(--blue);  }

.mini-s-name {
  font-size:9px; color:var(--text-dim);
  text-transform:uppercase; letter-spacing:1px; margin-top:3px;
}

/* Nav */
.sidebar-nav { padding:16px 12px; flex:1; }

.nav-section-label {
  font-family:'Press Start 2P', monospace;
  font-size:7px; color:var(--text-dim);
  letter-spacing:3px; padding:0 8px;
  margin-bottom:8px; text-transform:uppercase;
}

.nav-btn {
  display:flex; align-items:center; gap:12px;
  width:100%; padding:12px 12px;
  background:transparent;
  border:1px solid transparent;
  color:var(--text-dim);
  font-family:'Rajdhani', sans-serif;
  font-size:16px; font-weight:600;
  text-transform:uppercase; letter-spacing:2px;
  cursor:pointer; transition:all 0.2s;
  margin-bottom:4px; text-align:left;
}

.nav-btn:hover {
  background:var(--gold-dim);
  border-color:var(--border);
  color:var(--text);
}

.nav-btn.active {
  background:var(--gold-dim);
  border-color:rgba(245,200,66,0.3);
  color:var(--gold);
}

.nav-btn svg { flex-shrink:0; opacity:0.7; }
.nav-btn.active svg { opacity:1; }

/* Season badge bottom */
.sidebar-footer {
  padding:16px 20px;
  border-top:1px solid var(--border-soft);
}

.season-tag {
  font-family:'Press Start 2P', monospace;
  font-size:7px; color:var(--text-dim);
  text-align:center; line-height:2;
}

/* ── MAIN ── */
.main { padding:32px; overflow-y:auto; }

/* ── TOPBAR ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:28px; padding-bottom:20px;
  border-bottom:1px solid var(--border-soft);
}

.page-title {
  font-family:'Rajdhani', sans-serif;
  font-size:24px; font-weight:700;
  text-transform:uppercase; letter-spacing:4px;
  color:var(--gold);
}

.topbar-right {
  font-family:'Press Start 2P', monospace;
  font-size:8px; color:var(--text-dim);
  text-align:right; line-height:2;
}

/* ── PANEL ── */
.panel {
  background:var(--bg2);
  border:1px solid var(--border-soft);
  margin-bottom:20px;
  overflow:hidden;
}

.panel-head {
  background:var(--bg3);
  border-bottom:1px solid var(--border-soft);
  padding:12px 20px;
  display:flex; align-items:center; gap:10px;
}

.panel-title {
  font-family:'Rajdhani', sans-serif;
  font-size:16px; font-weight:700;
  color:var(--gold); text-transform:uppercase;
  letter-spacing:4px; flex:1;
}

.panel-meta {
  font-family:'Press Start 2P', monospace;
  font-size:9px; color:var(--text-dim);
}

.panel-body { padding:20px; }

/* ── STATS GRID (dashboard) ── */
.stats-grid {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:12px; margin-bottom:20px;
}

.stat-tile {
  background:var(--bg2);
  border:1px solid var(--border-soft);
  padding:20px 16px; text-align:center;
  transition:all 0.2s; cursor:default;
  position:relative;
}

.stat-tile:hover { border-color:rgba(245,200,66,0.3); transform:translateY(-2px); }
.stat-tile::after {
  content:''; position:absolute;
  bottom:0; left:0; right:0; height:2px;
  opacity:0; transition:opacity 0.2s;
}
.stat-tile:hover::after { opacity:1; }
.st1::after{background:var(--green);}
.st2::after{background:var(--blue);}
.st3::after{background:var(--purple);}
.st4::after{background:var(--gold);}

.s-ico { font-size:24px; margin-bottom:8px; display:block; }
.s-val {
  font-family:'Rajdhani', sans-serif;
  font-size:32px; font-weight:700; line-height:1; margin-bottom:6px;
}
.s-val.green{color:var(--green);text-shadow:0 0 12px rgba(61,255,160,0.3);}
.s-val.blue {color:var(--blue); text-shadow:0 0 12px rgba(94,184,255,0.3);}
.s-val.purple{color:var(--purple);text-shadow:0 0 12px rgba(192,132,252,0.3);}
.s-val.gold {color:var(--gold); text-shadow:0 0 12px rgba(245,200,66,0.3);}
.s-name { font-size:13px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; font-weight:600; }

/* ── PROGRESS PANEL ── */
.xp-wrap { margin-bottom:12px; }
.xp-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.xp-level { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:2px; }
.xp-count { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--text-dim); }
.xp-track { height:8px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.05); overflow:hidden; }
.xp-fill { height:100%; background:linear-gradient(90deg,#92400e,var(--gold)); box-shadow:0 0 8px rgba(245,200,66,0.3); transition:width 1.2s ease; }
.xp-sub { font-size:11px; color:var(--text-dim); margin-top:6px; }

.levels-list { border-top:1px solid var(--border-soft); padding-top:14px; display:flex; flex-direction:column; gap:7px; }
.level-row { display:flex; justify-content:space-between; align-items:center; }
.level-row-name { font-family:'Rajdhani',sans-serif; font-size:13px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
.level-row-name.epic { color:var(--purple); }
.level-row-xp { font-family:'Press Start 2P',monospace; font-size:6px; color:var(--text-dim); }

/* ── POMO ── */
.pomo-list { display:flex; flex-direction:column; gap:10px; }
.pomo-row {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; background:var(--bg3);
  border:1px solid var(--border-soft); transition:border-color 0.2s;
}
.pomo-row:hover { border-color:rgba(245,200,66,0.2); }
.pomo-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.pomo-dot.on { background:var(--green); box-shadow:0 0 6px var(--green); animation:pdot 1.5s infinite; }
.pomo-dot.off { background:var(--text-dim); }
@keyframes pdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.8)} }
.pomo-info { flex:1; }
.pomo-lbl { font-size:15px; font-weight:600; color:var(--text); }
.pomo-xp { font-family:'Press Start 2P',monospace; font-size:6px; color:var(--green); margin-top:3px; }
.pomo-time { font-family:'Rajdhani',monospace; font-size:20px; font-weight:700; color:var(--gold); }
.pomo-time.dim { color:var(--text-dim); }

/* ── ACHIEVEMENTS ── */
.ach-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(130px,1fr));
  gap:10px;
}

.ach {
  background:var(--bg3);
  border:1px solid var(--border-soft);
  padding:16px 10px 14px; text-align:center;
  position:relative; cursor:pointer;
  transition:all 0.25s;
}

.ach.unlocked { border-color:rgba(245,200,66,0.3); background:linear-gradient(180deg,rgba(245,200,66,0.05) 0%,var(--bg2) 100%); }
.ach.unlocked:hover { border-color:var(--gold); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.4),0 0 20px rgba(245,200,66,0.1); }
.ach.locked { opacity:0.35; filter:grayscale(0.6); cursor:default; }

.rarity-bar { position:absolute; top:0; left:0; right:0; height:3px; }
.rarity-bar.common  { background:#9ca3af; }
.rarity-bar.rare    { background:var(--blue); box-shadow:0 0 6px var(--blue); }
.rarity-bar.epic    { background:var(--purple); box-shadow:0 0 6px var(--purple); }
.rarity-bar.legend  { background:linear-gradient(90deg,var(--gold),var(--gold2)); box-shadow:0 0 8px var(--gold); }

.rarity-tag { position:absolute; top:7px; right:7px; font-family:'Press Start 2P',monospace; font-size:5px; }
.rarity-tag.common  { color:#9ca3af; }
.rarity-tag.rare    { color:var(--blue); }
.rarity-tag.epic    { color:var(--purple); }
.rarity-tag.legend  { color:var(--gold); }

.ach-ico { font-size:30px; margin:8px 0 10px; display:block; line-height:1; }
.ach-name { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text); margin-bottom:4px; line-height:1.2; }
.ach-desc { font-size:12px; color:var(--text-dim); line-height:1.4; }
.ach-date { font-family:'Press Start 2P',monospace; font-size:5px; color:var(--green); margin-top:6px; }

/* ── POSTS ── */
.post-card {
  background:var(--bg2); border:1px solid var(--border-soft);
  margin-bottom:14px; padding:24px;
  position:relative; transition:all 0.2s;
}
.post-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:linear-gradient(180deg,var(--gold),transparent); }
.post-card:hover { border-color:rgba(245,200,66,0.2); }

.post-meta { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--text-dim); letter-spacing:1px; margin-bottom:10px; }
.post-title { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--text); margin-bottom:10px; cursor:pointer; transition:color 0.2s; }
.post-title:hover { color:var(--gold); }
.post-body { font-size:16px; line-height:1.8; color:rgba(226,223,245,0.75); margin-bottom:14px; }
.post-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.post-tags { display:flex; gap:6px; flex-wrap:wrap; }
.tag {
  font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:600;
  padding:2px 10px; border:1px solid rgba(191,0,255,0.3);
  color:var(--purple); text-transform:uppercase; letter-spacing:1px;
}
.post-badges { display:flex; gap:4px; }
.post-badge { font-size:14px; }

/* ── CREATE POST ── */
.form-group { margin-bottom:18px; }
.form-label {
  display:block; font-family:'Press Start 2P',monospace;
  font-size:8px; color:var(--gold);
  text-transform:uppercase; letter-spacing:2px; margin-bottom:8px;
}
.form-input, .form-textarea {
  width:100%; background:var(--bg3);
  border:1px solid var(--border-soft);
  padding:12px 16px; color:var(--text);
  font-family:'Nunito',sans-serif; font-size:14px;
  transition:all 0.2s;
}
.form-input:focus, .form-textarea:focus {
  outline:none; border-color:rgba(245,200,66,0.4);
  box-shadow:0 0 10px rgba(245,200,66,0.1);
}
.form-textarea { min-height:180px; resize:vertical; }
.form-btn {
  background:linear-gradient(90deg,var(--gold2),var(--gold));
  border:none; padding:14px 32px;
  color:var(--bg); font-family:'Rajdhani',sans-serif;
  font-size:14px; font-weight:700;
  text-transform:uppercase; letter-spacing:3px;
  cursor:pointer; transition:all 0.2s;
}
.form-btn:hover { box-shadow:0 0 20px rgba(245,200,66,0.3); transform:translateY(-1px); }

/* ── STATS VIEW ── */
.stats-big-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:20px; }
.stat-big {
  background:var(--bg2); border:1px solid var(--border-soft);
  padding:24px 20px; text-align:center; position:relative;
}
.stat-big::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--gold),var(--gold2)); }
.stat-big-val { font-family:'Rajdhani',sans-serif; font-size:40px; font-weight:700; color:var(--gold); text-shadow:0 0 12px rgba(245,200,66,0.3); margin-bottom:4px; }
.stat-big-lbl { font-size:13px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.8);
  display:flex; align-items:center; justify-content:center;
  z-index:1000; opacity:0; pointer-events:none;
  transition:opacity 0.25s;
}
.modal-overlay.active { opacity:1; pointer-events:all; }

.modal {
  background:var(--bg2); border:1px solid var(--border);
  padding:32px; max-width:360px; width:90%;
  text-align:center; position:relative;
  transform:scale(0.9); transition:transform 0.25s;
}
.modal-overlay.active .modal { transform:scale(1); }
.modal::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }

.modal-ico { font-size:48px; margin-bottom:16px; display:block; }
.modal-name { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
.modal-desc { font-size:14px; color:var(--text-dim); line-height:1.6; margin-bottom:14px; }
.modal-cond {
  background:var(--bg3); border:1px solid var(--border-soft);
  padding:10px 14px; font-size:12px; color:var(--text-dim);
  font-style:italic; margin-bottom:20px;
}
.modal-xp { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--green); margin-bottom:20px; }
.modal-close-btn {
  background:linear-gradient(90deg,var(--gold2),var(--gold));
  border:none; padding:12px 28px;
  color:var(--bg); font-family:'Rajdhani',sans-serif;
  font-size:13px; font-weight:700;
  text-transform:uppercase; letter-spacing:3px;
  cursor:pointer; transition:all 0.2s;
}
.modal-close-btn:hover { box-shadow:0 0 16px rgba(245,200,66,0.3); }

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:60px 20px; }
.empty-ico { font-size:40px; opacity:0.2; margin-bottom:14px; }
.empty-txt { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--text-dim); letter-spacing:2px; line-height:2.2; }

/* ── MOBILE ── */
.mob-header {
  display:none;
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:14px 16px;
  align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:50;
}
.mob-logo { font-family:'Press Start 2P',monospace; font-size:10px; color:var(--gold); }
.mob-menu-btn {
  background:none; border:1px solid var(--border-soft);
  color:var(--text); padding:8px; cursor:pointer; font-size:16px;
}
.sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:80; }
.sidebar-overlay.active { display:block; }

@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.view-animate { animation:fadeUp 0.3s ease both; }

@media (max-width:768px) {
  .mob-header { display:flex; }
  .app { grid-template-columns:1fr; }
  .sidebar { position:fixed; left:-280px; top:0; bottom:0; width:260px; z-index:90; transition:left 0.3s ease; }
  .sidebar.open { left:0; }
  .main { padding:20px 16px; }
  .topbar { flex-direction:column; align-items:flex-start; gap:6px; }
  .stats-grid { grid-template-columns:repeat(2,1fr); }
  .two-col { grid-template-columns:1fr !important; }
  .ach-grid { grid-template-columns:repeat(2,1fr); }
  .stats-big-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- MOBILE HEADER -->
<div class="mob-header">
  <div class="mob-logo">SYNTHCASH LOGS</div>
  <button class="mob-menu-btn" onclick="toggleSidebar()">☰</button>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app">

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">

  <div class="sidebar-logo">
    <div class="logo-text">SYNTH<span style="color:var(--gold2)">CASH</span> LOGS</div>
    <div class="logo-sub">// AI Content Journey</div>
  </div>

  <div class="char-sheet">
    <div class="avatar-wrap">
      <div class="avatar">🤖</div>
      <div class="lv-badge" id="lvBadge">LV. 01</div>
    </div>
    <div class="char-name">SynthCash</div>
    <div class="char-class" id="charClass">★ Rookie AI Content Warrior ★</div>
    <div class="bars">
      <div class="bar-row">
        <div class="bar-lbl hp">HP</div>
        <div class="bar-track"><div class="bar-fill hp" style="width:100%"></div></div>
        <div class="bar-val">100/100</div>
      </div>
      <div class="bar-row">
        <div class="bar-lbl fp">FOCUS</div>
        <div class="bar-track"><div class="bar-fill fp" id="focusBar" style="width:70%"></div></div>
        <div class="bar-val" id="focusVal">70/100</div>
      </div>
      <div class="bar-row">
        <div class="bar-lbl xp">XP</div>
        <div class="bar-track"><div class="bar-fill xp" id="xpBarSide" style="width:5%"></div></div>
        <div class="bar-val" id="xpValSide">50/1000</div>
      </div>
    </div>
  </div>

  <div class="mini-stats">
    <div class="mini-s">
      <div class="mini-s-val green" id="sideEarnings">$0</div>
      <div class="mini-s-name">Доход</div>
    </div>
    <div class="mini-s">
      <div class="mini-s-val blue" id="sideVideos">0</div>
      <div class="mini-s-name">Видео</div>
    </div>
    <div class="mini-s">
      <div class="mini-s-val" id="sideDays">1</div>
      <div class="mini-s-name">Дней</div>
    </div>
    <div class="mini-s">
      <div class="mini-s-val" id="sidePosts">0</div>
      <div class="mini-s-name">Постов</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Навигация</div>

    <button class="nav-btn active" id="nav-dashboard" onclick="navigate('dashboard')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Дашборд
    </button>

    <button class="nav-btn" id="nav-posts" onclick="navigate('posts')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
      Журнал
    </button>

    <button class="nav-btn" id="nav-badges" onclick="navigate('badges')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
      Достижения
    </button>

    <button class="nav-btn" id="nav-stats" onclick="navigate('stats')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
      Статистика
    </button>

  </nav>

  <div class="sidebar-footer">
    <div class="season-tag">SEASON 01<br>DAY <span id="dayCount">001</span></div>
  </div>

</aside>

<!-- ── MAIN ── -->
<main class="main" id="mainArea"></main>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="achModal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <span class="modal-ico" id="mIco"></span>
    <div class="modal-name" id="mName"></div>
    <div class="modal-desc" id="mDesc"></div>
    <div class="modal-cond" id="mCond"></div>
    <div class="modal-xp" id="mXp"></div>
    <button class="modal-close-btn" onclick="document.getElementById('achModal').classList.remove('active')">Закрыть</button>
  </div>
</div>

<script>
// ── DATA ──
const DATA = {
  profile: {
    level: 1,
    currentXP: 50,
    nextLevelXP: 1000,
    totalEarnings: 0,
    monthlyEarnings: 0,
    videos: 0,
    views: 0,
    joinDate: '2025-01-01', // Дата запуска сайта — менять здесь
  },
  levels: [
    { level:1, name:'Rookie Creator',       minXP:0,     maxXP:1000  },
    { level:2, name:'Street Hustler',       minXP:1000,  maxXP:3000  },
    { level:3, name:'Content Mage',         minXP:3000,  maxXP:7000  },
    { level:4, name:'AI Warlord',           minXP:7000,  maxXP:15000 },
    { level:5, name:'Neural Overlord',      minXP:15000, maxXP:99999 },
  ],
  badges: [
    { id:'first-blood',  ico:'🔥', name:'First Blood',    desc:'Создан аккаунт и начат путь',        cond:'Зарегистрироваться',          rarity:'common', xp:50,  unlocked:true,  date:'День 1' },
    { id:'first-session',ico:'🍅', name:'First Session',  desc:'Первый помодоро на проекте',          cond:'Запустить первую сессию',      rarity:'common', xp:50,  unlocked:true,  date:'День 1' },
    { id:'first-upload', ico:'🎬', name:'First Upload',   desc:'Первое видео загружено на PH',        cond:'Загрузить 1 видео',            rarity:'rare',   xp:100, unlocked:false, date:null },
    { id:'first-dollar', ico:'💰', name:'First Dollar',   desc:'Первый заработанный доллар',          cond:'Заработать $1',                rarity:'rare',   xp:100, unlocked:false, date:null },
    { id:'viral-spark',  ico:'👁️', name:'Viral Spark',    desc:'1000 просмотров на одном видео',      cond:'1000 просмотров',              rarity:'rare',   xp:150, unlocked:false, date:null },
    { id:'hustle-mode',  ico:'🚀', name:'Hustle Mode',    desc:'Заработано $100',                     cond:'Заработать $100',              rarity:'epic',   xp:250, unlocked:false, date:null },
    { id:'grind-100h',   ico:'⚡', name:'100h Grind',     desc:'100 часов в помодоро на проекте',    cond:'100 часов суммарно',           rarity:'epic',   xp:250, unlocked:false, date:null },
    { id:'neural-king',  ico:'👑', name:'Neural King',    desc:'$1000 в один месяц',                  cond:'$1000/мес',                    rarity:'legend', xp:500, unlocked:false, date:null },
  ],
  posts: [],
  pomodoro: {
    'AI Content (PH)': 0,
    'Другие AI-проекты': 0,
    'Обучение / ресёрч': 0,
  }
};

// Day count
function getDayCount() {
  const join = new Date(DATA.profile.joinDate);
  const now = new Date();
  const diff = Math.floor((now - join) / (1000*60*60*24)) + 1;
  return String(diff).padStart(3,'0');
}

document.getElementById('dayCount').textContent = getDayCount();

// Update sidebar
function updateSidebar() {
  const p = DATA.profile;
  const lv = DATA.levels.find(l => p.currentXP >= l.minXP && p.currentXP < l.maxXP) || DATA.levels[DATA.levels.length-1];
  document.getElementById('lvBadge').textContent = 'LV. ' + String(lv.level).padStart(2,'0');
  document.getElementById('charClass').textContent = '★ ' + lv.name + ' ★';
  const pct = Math.round(((p.currentXP - lv.minXP) / (lv.maxXP - lv.minXP)) * 100);
  document.getElementById('xpBarSide').style.width = pct + '%';
  document.getElementById('xpValSide').textContent = p.currentXP + '/' + lv.maxXP;
  document.getElementById('sideEarnings').textContent = '$' + p.totalEarnings;
  document.getElementById('sideVideos').textContent = p.videos;
  document.getElementById('sideDays').textContent = getDayCount();
  document.getElementById('sidePosts').textContent = DATA.posts.length;
}

// Navigation
let currentView = 'dashboard';

function navigate(view) {
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + view).classList.add('active');
  renderView();
  if (window.innerWidth <= 768) toggleSidebar(false);
}

function renderView() {
  const el = document.getElementById('mainArea');
  el.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'view-animate';
  switch(currentView) {
    case 'dashboard': div.innerHTML = viewDashboard(); break;
    case 'posts':     div.innerHTML = viewPosts();     break;
    case 'badges':    div.innerHTML = viewBadges();    break;
    case 'stats':     div.innerHTML = viewStats();     break;
  }
  el.appendChild(div);
}

// ── VIEWS ──

function viewDashboard() {
  const p = DATA.profile;
  const lv = DATA.levels.find(l => p.currentXP >= l.minXP && p.currentXP < l.maxXP) || DATA.levels[DATA.levels.length-1];
  const xpPct = Math.round(((p.currentXP - lv.minXP) / (lv.maxXP - lv.minXP)) * 100);
  const unlockedCount = DATA.badges.filter(b => b.unlocked).length;
  const pomoTotal = Object.values(DATA.pomodoro).reduce((a,b) => a+b, 0);
  const pomoHours = Math.floor(pomoTotal/60) + ':' + String(pomoTotal%60).padStart(2,'0');

  return `
  <div class="topbar">
    <div class="page-title">Дашборд</div>
    <div class="topbar-right">SEASON 01 · DAY ${getDayCount()}</div>
  </div>

  <div class="stats-grid">
    <div class="stat-tile st1">
      <span class="s-ico">💰</span>
      <div class="s-val green">$${p.totalEarnings}</div>
      <div class="s-name">Заработано</div>
    </div>
    <div class="stat-tile st2">
      <span class="s-ico">🎬</span>
      <div class="s-val blue">${p.videos}</div>
      <div class="s-name">Видео</div>
    </div>
    <div class="stat-tile st3">
      <span class="s-ico">⚔️</span>
      <div class="s-val purple">${getDayCount()}</div>
      <div class="s-name">Дней в пути</div>
    </div>
    <div class="stat-tile st4">
      <span class="s-ico">🍅</span>
      <div class="s-val gold">${pomoHours}</div>
      <div class="s-name">Время сегодня</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;" class="two-col">

    <div class="panel">
      <div class="panel-head">
        <span>🍅</span>
        <span class="panel-title">Время в бою</span>
        <span class="panel-meta" style="color:var(--red);animation:pdot 1s infinite">● LIVE</span>
      </div>
      <div class="panel-body">
        <div class="pomo-list">
          ${Object.entries(DATA.pomodoro).map((([k,v],i) => `
          <div class="pomo-row">
            <div class="pomo-dot ${i===0?'on':'off'}"></div>
            <div class="pomo-info">
              <div class="pomo-lbl">${k}</div>
              <div class="pomo-xp">+${i===0?2:1} XP / помодоро</div>
            </div>
            <div class="pomo-time ${v===0?'dim':''}">${Math.floor(v/60)}:${String(v%60).padStart(2,'0')}</div>
          </div>`)).join('')}
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <span>⚡</span>
        <span class="panel-title">Прокачка</span>
      </div>
      <div class="panel-body">
        <div class="xp-wrap">
          <div class="xp-top">
            <div class="xp-level">${lv.name}</div>
            <div class="xp-count">${p.currentXP} / ${lv.maxXP}</div>
          </div>
          <div class="xp-track"><div class="xp-fill" style="width:${xpPct}%"></div></div>
          <div class="xp-sub">До Level ${lv.level+1} — осталось ${lv.maxXP - p.currentXP} XP</div>
        </div>
        <div class="levels-list">
          ${DATA.levels.slice(lv.level).slice(0,3).map(l => `
          <div class="level-row">
            <div class="level-row-name ${l.level===5?'epic':''}">Lv.${l.level} — ${l.name}</div>
            <div class="level-row-xp">${l.minXP} XP</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

  </div>

  <div class="panel">
    <div class="panel-head">
      <span>🏆</span>
      <span class="panel-title">Достижения</span>
      <span class="panel-meta">${unlockedCount} / ${DATA.badges.length}</span>
    </div>
    <div class="panel-body">
      <div class="ach-grid">
        ${DATA.badges.map(b => `
        <div class="ach ${b.unlocked?'unlocked':'locked'}" onclick="${b.unlocked?`openModal('${b.id}')`:''}" >
          <div class="rarity-bar ${b.rarity}"></div>
          <div class="rarity-tag ${b.rarity}">${b.rarity[0].toUpperCase()}</div>
          <span class="ach-ico">${b.ico}</span>
          <div class="ach-name">${b.name}</div>
          <div class="ach-desc">${b.desc}</div>
          ${b.unlocked ? `<div class="ach-date">✓ ${b.date}</div>` : ''}
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function viewPosts() {
  return `
  <div class="topbar">
    <div class="page-title">Журнал квестов</div>

  </div>
  ${DATA.posts.length === 0 ? `
  <div class="empty-state">
    <div class="empty-ico">📜</div>
    <div class="empty-txt">Здесь появятся твои записи<br>Начни с первой!</div>
  </div>` : DATA.posts.slice().reverse().map(post => `
  <div class="post-card">
    <div class="post-meta">${formatDate(post.date)} // ЗАПИСЬ #${String(post.id).padStart(3,'0')}</div>
    <div class="post-title">${post.title}</div>
    <div class="post-body">${formatContent(post.content)}</div>
    <div class="post-footer">
      <div class="post-tags">${post.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
    </div>
  </div>`).join('')}`;
}

function viewBadges() {
  const unlocked = DATA.badges.filter(b => b.unlocked);
  const locked = DATA.badges.filter(b => !b.unlocked);
  return `
  <div class="topbar">
    <div class="page-title">Достижения</div>
    <div class="topbar-right">${unlocked.length} / ${DATA.badges.length} получено</div>
  </div>
  <div class="panel">
    <div class="panel-head"><span>✅</span><span class="panel-title">Получены</span><span class="panel-meta">${unlocked.length} шт</span></div>
    <div class="panel-body">
      ${unlocked.length === 0 ? '<div style="text-align:center;color:var(--text-dim);font-size:13px;padding:20px">Пока нет полученных бейджей</div>' :
      `<div class="ach-grid">${unlocked.map(b => `
        <div class="ach unlocked" onclick="openModal('${b.id}')">
          <div class="rarity-bar ${b.rarity}"></div>
          <div class="rarity-tag ${b.rarity}">${b.rarity[0].toUpperCase()}</div>
          <span class="ach-ico">${b.ico}</span>
          <div class="ach-name">${b.name}</div>
          <div class="ach-desc">${b.desc}</div>
          <div class="ach-date">✓ ${b.date}</div>
        </div>`).join('')}</div>`}
    </div>
  </div>
  <div class="panel">
    <div class="panel-head"><span>🔒</span><span class="panel-title">Ещё не получены</span><span class="panel-meta">${locked.length} шт</span></div>
    <div class="panel-body">
      <div class="ach-grid">${locked.map(b => `
        <div class="ach locked">
          <div class="rarity-bar ${b.rarity}"></div>
          <div class="rarity-tag ${b.rarity}">${b.rarity[0].toUpperCase()}</div>
          <span class="ach-ico">${b.ico}</span>
          <div class="ach-name">${b.name}</div>
          <div class="ach-desc">${b.cond}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function viewStats() {
  const p = DATA.profile;
  const pomoTotal = Object.values(DATA.pomodoro).reduce((a,b) => a+b, 0);
  return `
  <div class="topbar">
    <div class="page-title">Статистика</div>
    <div class="topbar-right">SEASON 01</div>
  </div>
  <div class="stats-big-grid">
    <div class="stat-big"><div class="stat-big-val">$${p.totalEarnings}</div><div class="stat-big-lbl">Всего заработано</div></div>
    <div class="stat-big"><div class="stat-big-val">$${p.monthlyEarnings}</div><div class="stat-big-lbl">Этот месяц</div></div>
    <div class="stat-big"><div class="stat-big-val">${p.videos}</div><div class="stat-big-lbl">Видео загружено</div></div>
    <div class="stat-big"><div class="stat-big-val">${DATA.posts.length}</div><div class="stat-big-lbl">Записей в журнале</div></div>
    <div class="stat-big"><div class="stat-big-val">${Math.floor(pomoTotal/60)}ч ${pomoTotal%60}м</div><div class="stat-big-lbl">Время в работе</div></div>
    <div class="stat-big"><div class="stat-big-val">${p.currentXP}</div><div class="stat-big-lbl">Опыта набрано</div></div>
    <div class="stat-big"><div class="stat-big-val">${DATA.badges.filter(b=>b.unlocked).length}</div><div class="stat-big-lbl">Бейджей получено</div></div>
  </div>

  <div class="panel">
    <div class="panel-head"><span>🍅</span><span class="panel-title">Помодоро по направлениям</span></div>
    <div class="panel-body">
      <div class="pomo-list">
        ${Object.entries(DATA.pomodoro).map(([k,v]) => `
        <div class="pomo-row">
          <div class="pomo-info"><div class="pomo-lbl">${k}</div></div>
          <div class="pomo-time ${v===0?'dim':''}">${Math.floor(v/60)}ч ${v%60}м</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}



  const post = {
    id: DATA.posts.length + 1,
    title, content,
    tags: tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [],
    date: new Date().toISOString().split('T')[0],
    earnings, videos
  };

  DATA.posts.push(post);
  DATA.profile.totalEarnings += earnings;
  DATA.profile.monthlyEarnings += earnings;
  DATA.profile.videos += videos;
  DATA.profile.currentXP += 25; // XP за пост

  updateSidebar();
  navigate('posts');
}

// Modal
function openModal(id) {
  const b = DATA.badges.find(x => x.id === id);
  if (!b) return;
  document.getElementById('mIco').textContent = b.ico;
  document.getElementById('mName').textContent = b.name;
  document.getElementById('mDesc').textContent = b.desc;
  document.getElementById('mCond').textContent = 'Условие: ' + b.cond;
  document.getElementById('mXp').textContent = '+' + b.xp + ' XP';
  document.getElementById('achModal').classList.add('active');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('achModal')) {
    document.getElementById('achModal').classList.remove('active');
  }
}

// Mobile sidebar
function toggleSidebar(force) {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('sidebarOverlay');
  const isOpen = typeof force !== 'undefined' ? force : !s.classList.contains('open');
  s.classList.toggle('open', isOpen);
  o.classList.toggle('active', isOpen);
}

// Helpers
function formatDate(d) {
  return new Date(d).toLocaleDateString('ru-RU', { year:'numeric', month:'long', day:'numeric' });
}

function formatContent(c) {
  return c
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// Init
updateSidebar();
renderView();
</script>
</body>
</html>
