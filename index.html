<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynthCash Logs</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── MOBILE HEADER ── -->
<div class="mob-header">
  <div class="mob-logo">SYNTHCASH LOGS</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="theme-toggle" id="themeToggleMob" aria-label="Переключить тему">
      <div class="theme-toggle-thumb" id="toggleThumbMob">🌙</div>
    </button>
    <button class="mob-menu-btn" id="mobMenuBtn">☰</button>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app">

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="header-left">
      <div>
        <div class="logo">SYNTH<span style="opacity:0.7">CASH</span> LOGS</div>
        <div class="logo-sub">// AI Content Journey</div>
      </div>
    </div>
    <div class="header-right">
      <div class="day-badge" id="headerDay">DAY 001</div>

      <!-- THEME TOGGLE -->
      <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
        <div class="theme-toggle-thumb" id="toggleThumb">🌙</div>
      </button>
    </div>
  </header>

  <!-- ── BODY ── -->
  <div class="body-layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">

      <div class="nav-section-label">Навигация</div>

      <button class="nav-btn active" id="nav-dashboard">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Дашборд
      </button>

      <button class="nav-btn" id="nav-posts">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Журнал
      </button>

      <button class="nav-btn" id="nav-badges">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="7"/>
          <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
        </svg>
        Достижения
      </button>

      <button class="nav-btn" id="nav-stats">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" x2="18" y1="20" y2="10"/>
          <line x1="12" x2="12" y1="20" y2="4"/>
          <line x1="6" x2="6" y1="20" y2="14"/>
        </svg>
        Статистика
      </button>

      <div class="sidebar-spacer"></div>

      <div class="sidebar-footer">
        <div class="season-tag">
          SEASON 01<br>
          DAY <span id="dayCountFooter">001</span>
        </div>
      </div>

    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="main" id="mainArea"></main>

  </div><!-- /body-layout -->

</div><!-- /app -->

<!-- ── MODAL ── -->
<div class="modal-overlay" id="achModal">
  <div class="modal">
    <span class="modal-ico" id="mIco"></span>
    <div class="modal-name" id="mName"></div>
    <div class="modal-desc" id="mDesc"></div>
    <div class="modal-cond" id="mCond"></div>
    <div class="modal-xp"   id="mXp"></div>
    <button class="modal-close-btn" id="modalCloseBtn">Закрыть</button>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

<script>
  // Modal close button — вешаем отдельно чтобы не зависеть от порядка загрузки
  document.getElementById('modalCloseBtn').addEventListener('click', () => {
    document.getElementById('achModal').classList.remove('active');
  });
  // Мобильный toggle тоже синхронизируем
  document.getElementById('themeToggleMob').addEventListener('click', toggleTheme);
</script>

</body>
</html>
